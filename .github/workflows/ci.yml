name: CI

on:
  push:
    branches:
      - main
      - renderer_dev
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify gofmt
        shell: bash
        run: |
          set -euo pipefail
          unformatted="$(gofmt -l .)"
          if [[ -n "${unformatted}" ]]; then
            echo "These files are not gofmt-formatted:"
            echo "${unformatted}"
            exit 1
          fi

      - name: Run go test
        run: go test ./...

      - name: Run race tests
        run: go test -race ./...

      - name: Run go build
        run: go build ./...
